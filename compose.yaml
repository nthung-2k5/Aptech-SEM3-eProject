services:
#  giveaid:
#    image: giveaid
#    build:
#      context: .
#      dockerfile: GiveAID/Dockerfile
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlserver-container
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=GiveAID@123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "GiveAID@123", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
  
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlserver_init_container
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./init.sql:/init.sql
    entrypoint: /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P GiveAID@123 -i /init.sql -C"
    
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    ports:
      - "9000:9000"       # S3 API
      - "9001:9001"       # Web console
    environment:
      RUSTFS_ROOT_USER: giveaid
      RUSTFS_ROOT_PASSWORD: GiveAID@123
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
    command: [ "server", "/data", "--console-address", ":9001" ]
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mssql-data:
  rustfs-data:
